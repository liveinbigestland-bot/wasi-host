<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chord DHT 管理面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
h1 { color: #58a6ff; margin-bottom: 20px; font-size: 24px; }
h2 { color: #8b949e; font-size: 16px; margin: 16px 0 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px; }
.stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px 20px; min-width: 120px; }
.stat-card .value { font-size: 28px; font-weight: 600; color: #58a6ff; }
.stat-card .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 6px; }
th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 12px; text-transform: uppercase; }
td { padding: 8px 12px; border-bottom: 1px solid #21262d; font-size: 13px; font-family: 'SFMono-Regular', Consolas, monospace; }
tr:hover { background: #1c2128; }
.id-hex { color: #7ee787; }
.version { color: #d2a8ff; }
.time { color: #8b949e; }
.status-ok { color: #3fb950; }
.status-warn { color: #d29922; }
.error { color: #f85149; text-align: center; padding: 40px; }
.refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.refresh-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.refresh-btn:hover { background: #30363d; }
.loading { text-align: center; padding: 40px; color: #8b949e; }
</style>
</head>
<body>

<h1>⚡ Chord DHT 管理面板</h1>

<div class="refresh-bar">
  <span id="update-time" class="time">等待数据...</span>
  <div>
    <span class="time" style="margin-right:8px">自动刷新 5s</span>
    <button class="refresh-btn" onclick="fetchData()">立即刷新</button>
  </div>
</div>

<div class="stats" id="stats">
  <div class="stat-card"><div class="value" id="stat-nodes">-</div><div class="label">节点总数</div></div>
  <div class="stat-card"><div class="value" id="stat-version">-</div><div class="label">控制器版本</div></div>
</div>

<h2>节点列表</h2>
<table>
  <thead>
    <tr>
      <th>节点 ID</th>
      <th>版本</th>
      <th>上报次数</th>
      <th>最后上报</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody id="nodes-tbody">
    <tr><td colspan="5" class="loading">加载中...</td></tr>
  </tbody>
</table>

<div id="node-detail" style="display:none; margin-top:20px;">
  <h2>节点详情 <span id="detail-id-label" style="font-family:monospace;color:#7ee787;"></span></h2>
  <pre id="detail-content" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;overflow-x:auto;max-height:400px;"></pre>
</div>

<script>
let autoRefresh = null;

function fmtTime(ts) {
  if (!ts || ts === 0) return '-';
  const d = new Date(ts * 1000);
  return d.toLocaleString();
}

function hexShort(id) {
  if (!id || id === '0000000000000000000000000000000000000000') return '-';
  return id.substring(0, 8) + '...' + id.substring(32);
}

async function fetchData() {
  try {
    // Fetch health and nodes in parallel
    const [healthResp, nodesResp] = await Promise.all([
      fetch('/api/health'),
      fetch('/api/nodes')
    ]);
    const health = await healthResp.json();
    const nodesData = await nodesResp.json();

    document.getElementById('update-time').textContent =
      '更新于 ' + new Date().toLocaleTimeString();

    // Stats
    document.getElementById('stat-nodes').textContent = nodesData.count || 0;
    document.getElementById('stat-version').textContent = health.version || '-';

    // Nodes table
    const tbody = document.getElementById('nodes-tbody');
    if (!nodesData.nodes || nodesData.nodes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="loading">暂无节点</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    for (const node of nodesData.nodes) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="id-hex">${hexShort(node.id)}</td>
        <td class="version">${node.version || '-'}</td>
        <td>${node.reports || 0}</td>
        <td class="time">${fmtTime(node.last_seen)}</td>
        <td><a href="#" onclick="showNode('${node.id}');return false;" style="color:#58a6ff;">详情</a></td>
      `;
      tbody.appendChild(tr);
    }
  } catch (e) {
    console.error('fetch error:', e);
    document.getElementById('nodes-tbody').innerHTML =
      '<tr><td colspan="5" class="error">连接失败: ' + e.message + '</td></tr>';
  }
}

async function showNode(id) {
  const detail = document.getElementById('node-detail');
  const label = document.getElementById('detail-id-label');
  const content = document.getElementById('detail-content');
  label.textContent = id;
  content.textContent = '加载中...';
  detail.style.display = 'block';

  try {
    const resp = await fetch('/api/node/' + id);
    const data = await resp.json();
    content.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    content.textContent = '获取失败: ' + e.message;
  }
}

// Auto refresh every 5 seconds
autoRefresh = setInterval(fetchData, 5000);
fetchData();
</script>
</body>
</html>
